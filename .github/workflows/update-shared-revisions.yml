name: update shared revisions

on:
  workflow_call:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-shared-revisions-${{ github.repository }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Update shared revisions
        id: update
        uses: stayhydated/shared/.github/actions/update-shared-revisions@master

      - name: Update Cargo lockfile
        if: steps.update.outputs.changed == 'true'
        shell: bash
        run: |
          cargo metadata --format-version 1 > /dev/null
          git diff --check

      - name: Commit and push update
        if: steps.update.outputs.changed == 'true'
        env:
          SOURCE_SHORT_SHA: ${{ steps.update.outputs.source_short_sha }}
        shell: bash
        run: |
          set -euo pipefail

          update_branch="automation/update-shared-revisions"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$update_branch"
          git add -A
          git diff --cached --check
          git commit -m "chore(deps): update shared revisions to ${SOURCE_SHORT_SHA}"
          git push --force origin "HEAD:refs/heads/${update_branch}"

      - name: Open or update pull request
        if: steps.update.outputs.changed == 'true'
        env:
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ steps.update.outputs.source_sha }}
          SOURCE_SHORT_SHA: ${{ steps.update.outputs.source_short_sha }}
        shell: bash
        run: |
          set -euo pipefail

          update_branch="automation/update-shared-revisions"
          title="chore(deps): update shared revisions"
          body="This automated pull request updates Cargo dependencies sourced from [stayhydated/shared](https://github.com/stayhydated/shared) to commit [\`${SOURCE_SHORT_SHA}\`](https://github.com/stayhydated/shared/commit/${SOURCE_SHA}).

          CI runs created by the repository's built-in GitHub Actions token may require maintainer approval."
          pull_request_url="$(gh pr list \
            --base "$BASE_BRANCH" \
            --head "$update_branch" \
            --json url \
            --jq '.[0].url')"

          if [[ -z "$pull_request_url" ]]; then
            pull_request_url="$(gh pr create \
              --base "$BASE_BRANCH" \
              --head "$update_branch" \
              --title "$title" \
              --body "$body")"
          else
            gh pr edit "$pull_request_url" --title "$title" --body "$body"
          fi

          echo "Pull request: ${pull_request_url}" >> "$GITHUB_STEP_SUMMARY"
